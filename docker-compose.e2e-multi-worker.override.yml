# 本地多 Worker E2E — 在 docker-compose.e2e.yml 基础上追加第二个 worker 节点。
# 两个 worker 使用不同 ANCHOR_WORKER_HOST，注册到 server 后 endpoint 不冲突。
#
# Usage:
#   ANCHOR_API_TOKEN=test-e2e-token docker compose \
#     -f docker-compose.e2e.yml \
#     -f docker-compose.e2e-multi-worker.override.yml \
#     up -d --build server worker worker-b nginx fofa-mock
#
# 验证分配（扫描完成后）:
#   curl -H "Authorization: Bearer test-e2e-token" \
#     http://localhost:17421/runs/{runId}/tasks | jq 'group_by(.worker_id) | map({worker: .[0].worker_id, count: length})'

services:
  worker-b:
    build:
      context: .
      dockerfile: Dockerfile.worker-fast
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    image: anchor-worker:local
    container_name: anchor-worker-b
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker-b
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-test-e2e-token}
    volumes:
      - anchor-worker-b-data:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--worker", "--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net

volumes:
  anchor-worker-b-data:
