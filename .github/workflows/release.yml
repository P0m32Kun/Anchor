# Tag 推送时自动构建 Go 二进制并上传到 GitHub Release
# 用法：git tag v0.x.x && git push --tags
#
# 产出：anchor-linux-amd64、anchor-linux-arm64 附加到 Release assets
# Dockerfile 直接从 Release 下载二进制，不需要 golang 构建镜像
#
# arm64 通过交叉编译构建（gcc-aarch64-linux-gnu），不需要 ARM runner
# go-sqlite3 自带 sqlite3 源码，不需要系统 libsqlite3-dev

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build linux-amd64
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=gcc go build -ldflags="-w -s" -o anchor-linux-amd64 .

      - name: Build linux-arm64
        run: CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -ldflags="-w -s" -o anchor-linux-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: anchor-linux-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/anchor-linux-*
          generate_release_notes: true
