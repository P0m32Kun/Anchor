# Release workflow 完成后自动构建 Docker 镜像并推送到阿里云 ACR
# 需要在 GitHub repo Settings → Secrets 中配置：
#   ACR_REGISTRY: crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com
#   ACR_USERNAME: P0m32Kun
#   ACR_PASSWORD: <阿里云 ACR 登录密码>
#
# 支持多平台：linux/amd64 (VPS/PC), linux/arm64 (Mac M1/M2)

name: Docker Push

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: p0m32kun

jobs:
  push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 设置 QEMU 支持多平台构建
      - uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx
      - uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${ACR_REGISTRY} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push server
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.server \
            -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-server:latest \
            --push .

      - name: Build and push worker
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.worker \
            -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-worker:latest \
            --push .

      - name: Build and push frontend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.frontend \
            -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-frontend:latest \
            --push .
