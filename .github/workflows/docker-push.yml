# Release workflow 完成后自动构建 Docker 镜像并推送到阿里云 ACR
# 需要在 GitHub repo Settings → Secrets 中配置：
#   ACR_REGISTRY: crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com
#   ACR_USERNAME: P0m32Kun
#   ACR_PASSWORD: <阿里云 ACR 登录密码>

name: Docker Push

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: p0m32kun

jobs:
  push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${ACR_REGISTRY} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push server
        run: |
          docker build -f Dockerfile.server \
            --build-arg ACR_REGISTRY=${ACR_REGISTRY} \
            --build-arg ACR_NAMESPACE=${ACR_NAMESPACE} \
            -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-server:latest .
          docker push ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-server:latest

      - name: Build and push worker
        run: |
          docker build -f Dockerfile.worker \
            --build-arg ACR_REGISTRY=${ACR_REGISTRY} \
            --build-arg ACR_NAMESPACE=${ACR_NAMESPACE} \
            -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-worker:latest .
          docker push ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-worker:latest

      - name: Build and push frontend
        run: |
          docker build -f Dockerfile.frontend -t ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-frontend:latest .
          docker push ${ACR_REGISTRY}/${ACR_NAMESPACE}/anchor-frontend:latest
