services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: anchor-worker
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=${ANCHOR_CORE_URL:-http://server:17421}
      - ANCHOR_WORKER_HOST=${ANCHOR_WORKER_HOST:-worker}
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:?请在 .env 中设置 ANCHOR_API_TOKEN}
    volumes:
      - anchor-worker-data:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--worker", "--core-url", "${ANCHOR_CORE_URL:-http://server:17421}"]

volumes:
  anchor-worker-data:
