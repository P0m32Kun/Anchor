# 用户部署（仅 Worker）— 仅 ACR 镜像，不含 build。见 docker-compose.yml 顶部说明。

services:
  worker:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-worker:latest
    container_name: anchor-worker
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=${ANCHOR_CORE_URL:-http://server:17421}
      - ANCHOR_WORKER_HOST=${ANCHOR_WORKER_HOST:-worker}
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:?请在 .env 中设置 ANCHOR_API_TOKEN}
    volumes:
      - anchor-worker-data:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--worker", "--core-url", "${ANCHOR_CORE_URL:-http://server:17421}"]

volumes:
  anchor-worker-data:
