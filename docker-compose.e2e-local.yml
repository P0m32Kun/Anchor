# 本地开发测试专用 — server/worker 经 Dockerfile.*-fast 本地 build（anchor-*:local）。
# frontend 仍拉 ACR；用户生产部署请用 docker-compose.yml（仅 image，无 build）。
#
#   make build-base    # 首次或工具版本变更
#   make e2e-local     # build-fast + 启动

services:
  # --- Frontend (Nginx 静态 serve) ---
  frontend:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-frontend:latest
    container_name: anchor-frontend-e2e
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anchor-net

  # --- Core Server (本地快速构建) ---
  server:
    build:
      context: .
      dockerfile: Dockerfile.server-fast
    image: anchor-server:local
    container_name: anchor-server-e2e
    ports:
      - "17421:17421"
    volumes:
      - anchor-e2e-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-test-e2e-token}
      - ANCHOR_SCAN_ENGINE=1
    restart: unless-stopped
    networks:
      - anchor-net
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --noproxy '*' http://localhost:17421/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Remote Worker (本地快速构建) ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker-fast
    image: anchor-worker:local
    container_name: anchor-worker-e2e
    user: root
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-test-e2e-token}
    volumes:
      - anchor-e2e-data:/data
      - anchor-e2e-worker-home:/root
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net
      - rangefield-net

networks:
  anchor-net:
    name: anchor-net-e2e
    driver: bridge
  rangefield-net:
    external: true
    name: anchor-net

volumes:
  anchor-e2e-data:
  anchor-e2e-worker-home:
