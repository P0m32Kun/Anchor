# E2E 测试环境 - 使用本地构建的新代码（快速构建版本）
#
# 使用方法：
#   1. 首次使用或工具版本更新时，构建 base 镜像：
#      make build-base
#
#   2. 日常测试时，快速构建并启动：
#      make test-e2e
#
# 与 docker-compose.yml 的区别：
#   - server/worker 使用 Dockerfile.*-fast（基于本地 base 镜像）
#   - 构建速度快（只需复制二进制，约 10-30 秒）

services:
  # --- Frontend (Nginx 静态 serve) ---
  frontend:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-frontend:latest
    container_name: anchor-frontend-e2e
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anchor-net

  # --- Core Server (本地快速构建) ---
  server:
    build:
      context: .
      dockerfile: Dockerfile.server-fast
    image: anchor-server:local
    container_name: anchor-server-e2e
    ports:
      - "17421:17421"
    volumes:
      - anchor-e2e-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-test-e2e-token}
      - ANCHOR_SCAN_ENGINE=1
    restart: unless-stopped
    networks:
      - anchor-net
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --noproxy '*' http://localhost:17421/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Remote Worker (本地快速构建) ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker-fast
    image: anchor-worker:local
    container_name: anchor-worker-e2e
    user: root
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-test-e2e-token}
    volumes:
      - anchor-e2e-data:/data
      - anchor-e2e-worker-home:/root
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net
      - rangefield-net

networks:
  anchor-net:
    name: anchor-net-e2e
    driver: bridge
  rangefield-net:
    external: true
    name: anchor-net

volumes:
  anchor-e2e-data:
  anchor-e2e-worker-home:
