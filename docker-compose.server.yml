services:
  # --- Frontend (Nginx 静态 serve) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: anchor-frontend
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # --- Core Server ---
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: anchor-server
    ports:
      - "17421:17421"
    volumes:
      - anchor-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:?请在 .env 中设置 ANCHOR_API_TOKEN}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:17421/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  anchor-data:
