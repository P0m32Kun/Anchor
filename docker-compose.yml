version: "3.8"

services:
  # --- Core Server ---
  # 暴露到宿主机 17421，不启动本地 Worker（纯管理面）
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: anchor-server
    ports:
      - "17421:17421"
    volumes:
      - anchor-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
    restart: unless-stopped
    networks:
      - anchor-net
    # 绑定到 0.0.0.0 以便容器间和宿主机都能访问
    command: ["./anchor", "--no-local-worker"]

  # --- Remote Worker ---
  # 主动注册到 Server，通过长轮询获取任务
  # macOS Docker Desktop: 使用 host.docker.internal 访问宿主机端口
  # Linux: 可直接使用宿主机 LAN IP
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: anchor-worker
    environment:
      - ANCHOR_DATA_DIR=/data
      # macOS Docker Desktop 专用地址；Linux 可改为 http://192.168.0.107:17421
      - ANCHOR_CORE_URL=http://host.docker.internal:17421
      - ANCHOR_WORKER_HOST=host.docker.internal
    volumes:
      - anchor-worker-data:/data
    restart: unless-stopped
    # 不需要端口映射，Worker 主动连 Server
    networks:
      - anchor-net
    profiles: ["worker"]

networks:
  anchor-net:
    driver: bridge

volumes:
  anchor-data:
  anchor-worker-data:
