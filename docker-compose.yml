services:
  # --- Core Server ---
  # 暴露到宿主机 17421，不启动本地 Worker（纯管理面）
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: anchor-server
    ports:
      - "17421:17421"
    volumes:
      - anchor-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
    restart: unless-stopped
    networks:
      - anchor-net
    # 绑定到 0.0.0.0 以便容器间和宿主机都能访问
    # command 覆盖 Dockerfile 的 CMD（不是 ENTRYPOINT），只需传参数
    command: ["--no-local-worker"]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:17421/projects >/dev/null 2>&1 || true"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Remote Worker ---
  # 主动注册到 Server，通过长轮询获取任务
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: anchor-worker
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker
    # Worker 与 Server 共享 data volume，以便访问 Server 创建的 host files 和 artifacts
    # 注意：跨主机部署时，应通过 HTTP 传输文件内容而非共享 volume
    volumes:
      - anchor-data:/data
    restart: unless-stopped
    # 不需要端口映射，Worker 主动连 Server
    # privileged + cap_add 用于 Chromium/Rod 截图及网络扫描
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    # command 覆盖 Dockerfile 的 CMD（不是 ENTRYPOINT），只需传参数
    command: ["--worker", "--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net
    profiles: ["worker"]

networks:
  anchor-net:
    name: anchor-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  anchor-data:
  anchor-worker-data:
