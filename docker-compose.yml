services:
  # --- Frontend (Nginx 静态 serve) ---
  frontend:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: anchor-frontend
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anchor-net

  # --- Core Server ---
  server:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-server:latest
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: anchor-server
    ports:
      - "17421:17421"
    volumes:
      - anchor-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:?请在 .env 中设置 ANCHOR_API_TOKEN}
    restart: unless-stopped
    networks:
      - anchor-net
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:17421/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Remote Worker ---
  worker:
    image: ${ANCHOR_REGISTRY:-crpi-wthv8jhah5ufmzlr.cn-hangzhou.personal.cr.aliyuncs.com/p0m32kun}/anchor-worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: anchor-worker
    user: root
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:?请在 .env 中设置 ANCHOR_API_TOKEN}
    volumes:
      - anchor-data:/data
      - anchor-worker-home:/root  # 持久化 ~/templates/
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--worker", "--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net

networks:
  anchor-net:
    name: anchor-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  anchor-data:
  anchor-worker-home:  # Worker 家目录，持久化 ~/templates/
