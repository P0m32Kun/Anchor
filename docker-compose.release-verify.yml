# 上线前验证 — 结构与 docker-compose.yml 一致（仅 image、无 build），
# 使用本地构建的 release-candidate 三镜像，端口与容器名与生产栈隔离。
#
#   make release-verify          # 构建 + 启动 + 健康检查 + smoke
#   make release-verify-down

services:
  frontend:
    image: anchor-frontend:${RELEASE_VERIFY_TAG:-release-candidate}
    container_name: anchor-frontend-verify
    ports:
      - "${RELEASE_VERIFY_FRONTEND_PORT:-18080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anchor-net-verify

  server:
    image: anchor-server:${RELEASE_VERIFY_TAG:-release-candidate}
    container_name: anchor-server-verify
    ports:
      - "${RELEASE_VERIFY_SERVER_PORT:-17422}:17421"
    volumes:
      - anchor-release-verify-server-data:/data
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_PORT=17421
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-release-verify-token}
    restart: unless-stopped
    networks:
      - anchor-net-verify
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --noproxy '*' http://localhost:17421/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  worker:
    image: anchor-worker:${RELEASE_VERIFY_TAG:-release-candidate}
    container_name: anchor-worker-verify
    user: root
    environment:
      - ANCHOR_DATA_DIR=/data
      - ANCHOR_CORE_URL=http://server:17421
      - ANCHOR_WORKER_HOST=worker
      - ANCHOR_API_TOKEN=${ANCHOR_API_TOKEN:-release-verify-token}
    volumes:
      - anchor-release-verify-worker-data:/data
      - anchor-release-verify-worker-home:/root
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - NET_ADMIN
    command: ["--worker", "--core-url", "http://server:17421"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - anchor-net-verify

networks:
  anchor-net-verify:
    name: anchor-net-verify
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  anchor-release-verify-server-data:
  anchor-release-verify-worker-data:
  anchor-release-verify-worker-home:
